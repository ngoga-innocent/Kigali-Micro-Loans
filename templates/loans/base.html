<!-- templates/emails/base.html -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f4f7fb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, sans-serif;
      color: #0a2540;
    }

    .wrapper {
      width: 100%;
      padding: 24px 0;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.04);
    }

    .logo {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 24px;
      color: #2563eb;
    }

    .title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .text {
      font-size: 14px;
      color: #425466;
      line-height: 1.6;
    }

    .card {
      background: #f9fafb;
      border-radius: 10px;
      padding: 16px;
      margin: 20px 0;
    }

    .row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .label {
      color: #6b7280;
    }

    .value {
      font-weight: 500;
      color: #111827;
    }

    .status {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }

    .status.active { background: #e0f2fe; color: #0369a1; }
    .status.overdue { background: #fee2e2; color: #b91c1c; }
    .status.paid { background: #dcfce7; color: #15803d; }

    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 18px;
      background: #2563eb;
      color: white !important;
      text-decoration: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
    }

    .footer {
      margin-top: 28px;
      font-size: 12px;
      color: #9ca3af;
      text-align: center;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <div class="container">

      <div class="logo">
        Kigali Microloans
      </div>

      {% block content %}{% endblock %}

      <div class="footer">
        © Kigali Microloans · Secure Financial Services<br/>
        Kigali, Rwanda
      </div>

    </div>
  </div>
</body>
</html>
