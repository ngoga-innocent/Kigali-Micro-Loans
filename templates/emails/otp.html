<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Verification Code</title>
</head>
<body style="font-family: Arial, sans-serif; background:#f5f7fb; padding:20px;">
  
  <div style="max-width:500px; margin:auto; background:white; padding:30px; border-radius:10px;">
    
    <h2 style="color:#0f2a52; text-align:center;">
      {{ app_name }}
    </h2>

    <p>Hello {{ user.username|default:"User" }},</p>

    <p>
      Use the verification code below to complete your login:
    </p>

    <div style="text-align:center; margin:30px 0;">
      <span style="
        font-size:28px;
        letter-spacing:6px;
        font-weight:bold;
        color:#0f2a52;
      ">
        {{ otp }}
      </span>
    </div>

    <p style="color:#666; font-size:14px;">
      This code will expire at <strong>{{ expiry_time }}</strong>.
    </p>

    <p style="font-size:13px; color:#999;">
      If you didn’t request this, please ignore this email.
    </p>

    <hr style="margin:30px 0;" />

    <p style="text-align:center; font-size:12px; color:#aaa;">
      © {{ app_name }} • Secure Authentication System
    </p>

  </div>

</body>
</html>
