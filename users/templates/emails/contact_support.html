<!DOCTYPE html>
<html>
<body style="margin:0; padding:0; background:#f4f6f9; font-family:Arial, sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" style="padding:30px 0;">
    <tr>
      <td align="center">

        <table width="600" cellpadding="0" cellspacing="0"
          style="background:#ffffff; border-radius:10px; overflow:hidden;">

          <tr>
            <td style="background:#1f3c88; padding:20px; text-align:center;">
              <h2 style="color:#ffffff; margin:0;">
                Kigali Microloans Support
              </h2>
            </td>
          </tr>

          <tr>
            <td style="padding:25px;">

              <p>A new support request has been submitted.</p>

              <p><strong>Name:</strong> {{ name }}</p>
              <p><strong>Email:</strong> {{ email }}</p>

              <h3>Message</h3>
              <div style="background:#f9fafc; padding:15px; border-radius:6px;">
                {{ message }}
              </div>

            </td>
          </tr>

          <tr>
            <td style="padding:15px; text-align:center; font-size:12px; color:#999;">
              Kigali Microloans • Automated Email
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
